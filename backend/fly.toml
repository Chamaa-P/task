# Fly.io configuration for Task Collab Backend

app = "task-collab-backend"
primary_region = "iad"  # Change to your preferred region (e.g., "lax", "ams", "syd")

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  # Database connection - update after deploying database
  # DATABASE_URL will be set as a secret with: fly secrets set DATABASE_URL="postgresql://taskuser:taskpass@task-collab-db.internal:5432/taskcollab"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "get"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512