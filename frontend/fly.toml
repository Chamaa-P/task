# Fly.io configuration for Task Collab Frontend

app = "task-collab-frontend"
primary_region = "iad"  # Should match backend region

[build]
  dockerfile = "Dockerfile"
  [build.args]
    VITE_API_URL = "https://task-collab-backend.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "get"
    path = "/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
