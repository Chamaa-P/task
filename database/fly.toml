# Fly.io configuration for PostgreSQL Database

app = "task-collab-db"
primary_region = "iad"  # Should match backend/frontend region

[build]
  dockerfile = "Dockerfile"

[env]
  POSTGRES_USER = "taskuser"
  POSTGRES_DB = "taskcollab"

# Mount persistent volume for database data
[mounts]
  source = "postgres_data"
  destination = "/var/lib/postgresql/data"

# Internal service - not exposed to public internet
[[services]]
  internal_port = 5432
  protocol = "tcp"

  [[services.ports]]
    port = 5432

# VM configuration
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
